
  <div class="post-stats" *ngIf="postInfo">
    <div class="post-stat-likes">
      <img class="icon-likes" src="assets/icons/heart.svg" (click)="handleLikeClick()" [class.liked]="likeStatus().isLiked">
      <span class="likes">{{postInfo.like_count}}</span>
    </div>
    <div class="post-stat-com">
      <img class="icon-com" src="assets/icons/likes.svg">
      <span class="comments">{{postInfo.comment_count}}</span>
    </div>
  </div>
